  <path d="M32 20 C 30.5 11.5, 34.5 9, 32 3" stroke="#FFB800" stroke-width="3.5" stroke-linecap="round" />
  <path d="M40 18 C 38.5 13, 41.5 10.5, 40 5" stroke="#00F5FF" stroke-width="3" stroke-linecap="round" />
  
  <!-- Chopsticks -->
  <line x1="12" y1="12" x2="52" y2="22" stroke="#FFB800" stroke-width="2.5" stroke-linecap="round" />
  <line x1="8" y1="15" x2="48" y2="25" stroke="#FFB800" stroke-width="2.5" stroke-linecap="round" />

  <!-- Ceramic Bowl (Ichiraku Red) -->
